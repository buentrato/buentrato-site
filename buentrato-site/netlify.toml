[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function: procesar registros nuevos cada 5 minutos
[functions."process-submission"]
  schedule = "*/5 * * * *"

# PWA: Service Worker no debe cachearse
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

# PWA: Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Redirects para Single Page App behavior
[[redirects]]
  from = "/disc"
  to = "/disc.html"
  status = 200

[[redirects]]
  from = "/informe"
  to = "/informe.html"
  status = 200

[[redirects]]
  from = "/experiencia"
  to = "/experiencia.html"
  status = 200

[[redirects]]
  from = "/ie"
  to = "/ie.html"
  status = 200

[[redirects]]
  from = "/autoliderazgo"
  to = "/autoliderazgo.html"
  status = 200

[[redirects]]
  from = "/estilos"
