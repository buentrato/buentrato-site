[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function: procesar registros nuevos cada 5 minutos
[functions."process-submission"]
  schedule = "*/5 * * * *"

# Redirects para Single Page App behavior
[[redirects]]
  from = "/disc"
  to = "/disc.html"
  status = 200

[[redirects]]
  from = "/informe"
  to = "/informe.html"
  status = 200

[[redirects]]
  from = "/experiencia"
  to = "/experiencia.html"
  status = 200

[[redirects]]
  from = "/ie"
  to = "/ie.html"
  status = 200

[[redirects]]
  from = "/autoliderazgo"
  to = "/autoliderazgo.html"
  status = 200

[[redirects]]
  from = "/estilos"
  to = "/estilos.html"
  status = 200

[[redirects]]
  from = "/plan"
